<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Space+Grotesk%3Awght%40400%3B500%3B700"
    />
    <title>検索 - QWER TOKYO</title>
    <meta
      name="description"
      content="QWER TOKYO のアプリ一覧、アプリ詳細、制作プロセス、プロフィール、問い合わせページを横断検索できます。"
    />
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
    <style>
      .search-hero {
        display: grid;
        gap: 18px;
      }

      .search-form {
        display: grid;
        gap: 12px;
      }

      .search-form__control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .search-input {
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: rgba(255, 255, 255, 0.84);
        padding: 14px 18px;
        font-size: 15px;
        color: var(--text-body);
        outline: none;
      }

      .search-input:focus {
        border-color: var(--accent);
      }

      .search-button {
        border: none;
        border-radius: 999px;
        padding: 14px 22px;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), #ff8d54);
        box-shadow: 0 20px 36px rgba(232, 95, 61, 0.22);
        cursor: pointer;
      }

      .search-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .search-hint {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .results-header {
        display: grid;
        gap: 6px;
      }

      .results-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--text-muted);
        font-size: 14px;
      }

      .result-status {
        font-weight: 700;
        color: var(--text-strong);
      }

      .results-grid {
        display: grid;
        gap: 16px;
      }

      .result-card {
        border-radius: 24px;
        padding: 22px;
        border: 1px solid rgba(197, 177, 159, 0.72);
        background: rgba(255, 251, 245, 0.92);
        box-shadow: var(--shadow-card);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .result-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }

      .result-link {
        display: grid;
        gap: 12px;
        height: 100%;
      }

      .result-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 13px;
      }

      .result-badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-dark);
        font-weight: 700;
      }

      .result-url {
        color: var(--text-muted);
      }

      .result-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
        color: var(--text-strong);
      }

      .result-snippet {
        margin: 0;
        color: var(--text-muted);
      }

      .result-snippet mark {
        background: #ffe0a6;
        color: var(--text-strong);
        border-radius: 4px;
        padding: 0 2px;
      }

      .result-footer {
        color: var(--accent-dark);
        font-weight: 700;
        font-size: 14px;
      }

      .empty-state {
        padding: 18px 0;
        color: var(--text-muted);
      }

      @media (min-width: 768px) {
        .results-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .search-form__control {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout-container">
        {% include header.html %}
        <main class="page-main">
          <div class="page-content">
            <section class="hero-panel search-hero">
              <div>
                <p class="section-eyebrow">Search</p>
                <h1>アプリ、制作方針、公開ページを横断検索。</h1>
                <p>
                  QWER TOKYO 内のアプリ一覧、各アプリの詳細ページ、制作プロセス、プロフィール、問い合わせ導線、ポリシー類をまとめて検索できます。
                </p>
              </div>
              <form id="search-form" class="search-form" role="search">
                <div class="search-form__control">
                  <input
                    type="search"
                    id="search-input"
                    name="q"
                    class="search-input"
                    placeholder="例: AI Support、画面、プロトタイプ"
                    aria-label="検索ワードを入力"
                    autocomplete="off"
                  />
                  <button class="search-button" type="submit" id="search-submit">検索する</button>
                </div>
                <p class="search-hint">キーワードがページ本文か説明文に含まれていればヒットします。</p>
              </form>
            </section>

            <section class="surface-card section-stack">
              <div class="results-header">
                <h2 class="section-heading">検索結果</h2>
                <div class="results-meta">
                  <span id="search-title" class="result-status">検索ワードを入力してください</span>
                  <span id="search-status"></span>
                </div>
              </div>
              <div id="search-results" class="results-grid" aria-live="polite"></div>
            </section>
          </div>
        </main>
        {% include footer.html %}
      </div>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('search-input');
        const searchForm = document.getElementById('search-form');
        const searchTitle = document.getElementById('search-title');
        const searchStatus = document.getElementById('search-status');
        const resultsContainer = document.getElementById('search-results');
        const searchButton = document.getElementById('search-submit');
        const params = new URLSearchParams(window.location.search);
        const initialQuery = params.get('q')?.trim() || '';

        const searchableFiles = {{ searchable_files }};

        if (initialQuery) {
          searchInput.value = initialQuery;
          runSearch(initialQuery);
        } else {
          resultsContainer.innerHTML =
            '<div class="empty-state">検索バーにキーワードを入力すると結果が表示されます。</div>';
        }

        searchForm.addEventListener('submit', event => {
          event.preventDefault();
          const query = searchInput.value.trim();
          if (!query) {
            searchTitle.textContent = '検索ワードを入力してください';
            searchStatus.textContent = '';
            resultsContainer.innerHTML =
              '<div class="empty-state">検索ワードを入力すると、結果が表示されます。</div>';
            return;
          }

          const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
          window.history.replaceState({}, '', newUrl);
          runSearch(query);
        });

        async function runSearch(query) {
          searchTitle.textContent = `「${query}」の検索結果`;
          searchStatus.textContent = '検索中...';
          searchButton.disabled = true;
          resultsContainer.innerHTML =
            '<div class="empty-state">サイト内のページを走査しています...</div>';

          const results = await search(query, searchableFiles);
          displayResults(results, query);
          searchButton.disabled = false;
        }

        async function search(query, files) {
          const results = [];
          const q = query.toLowerCase();

          for (const file of files) {
            try {
              const response = await fetch(file);
              if (!response.ok) continue;
              const html = await response.text();
              const plainHtml = html.toLowerCase();
              if (!plainHtml.includes(q)) continue;

              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const title = doc.querySelector('title')?.textContent?.trim() || file;
              const description =
                doc.querySelector('meta[name="description"]')?.content?.trim() || '';
              const snippet = createSnippet(doc.body?.textContent || '', query);

              results.push({
                file,
                title,
                description,
                snippet,
                badge: getBadge(file)
              });
            } catch (error) {
              console.error(`Error processing ${file}:`, error);
            }
          }

          return results;
        }

        function displayResults(results, query) {
          resultsContainer.innerHTML = '';

          if (results.length === 0) {
            searchStatus.textContent = '一致したページはありませんでした。';
            resultsContainer.innerHTML =
              '<div class="empty-state">条件を変えて再度検索してみてください。</div>';
            return;
          }

          searchStatus.textContent = `${results.length}件ヒット`;
          const fragment = document.createDocumentFragment();

          results.forEach(result => {
            const card = document.createElement('article');
            card.className = 'result-card';

            const link = document.createElement('a');
            link.href = result.file;
            link.className = 'result-link';
            link.setAttribute('aria-label', `${result.title}のページを開く`);

            const meta = document.createElement('div');
            meta.className = 'result-meta';

            const badge = document.createElement('span');
            badge.className = 'result-badge';
            badge.textContent = result.badge;

            const url = document.createElement('span');
            url.className = 'result-url';
            url.textContent = result.file.replace('./', '/');

            meta.appendChild(badge);
            meta.appendChild(url);

            const title = document.createElement('h3');
            title.className = 'result-title';
            title.textContent = result.title;

            const snippet = document.createElement('p');
            snippet.className = 'result-snippet';
            snippet.innerHTML = highlightQuery(result.snippet || result.description, query);

            const footer = document.createElement('div');
            footer.className = 'result-footer';
            footer.innerHTML = 'ページを開く <span aria-hidden="true">↗</span>';

            link.appendChild(meta);
            link.appendChild(title);
            link.appendChild(snippet);
            link.appendChild(footer);
            card.appendChild(link);
            fragment.appendChild(card);
          });

          resultsContainer.appendChild(fragment);
        }

        function createSnippet(text, query) {
          const condensed = text.replace(/\s+/g, ' ').trim();
          if (!condensed) return '';

          const lowerText = condensed.toLowerCase();
          const lowerQuery = query.toLowerCase();
          const index = lowerText.indexOf(lowerQuery);

          if (index === -1) {
            return condensed.slice(0, 160) + (condensed.length > 160 ? '…' : '');
          }

          const start = Math.max(0, index - 72);
          const end = Math.min(condensed.length, index + query.length + 72);
          const prefix = start > 0 ? '…' : '';
          const suffix = end < condensed.length ? '…' : '';
          return `${prefix}${condensed.slice(start, end)}${suffix}`;
        }

        function highlightQuery(text, query) {
          if (!text) return '';
          const safeText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`(${escaped})`, 'gi');
          return safeText.replace(regex, '<mark>$1</mark>');
        }

        function getBadge(file) {
          if (file.startsWith('./apps/')) return 'App';

          const map = {
            './index.html': 'Home',
            './explore.html': 'Apps',
            './discover.html': 'Process',
            './about.html': 'Profile',
            './contact.html': 'Contact',
            './join.html': 'Brief',
            './privacy.html': 'Policy',
            './terms.html': 'Policy'
          };

          return map[file] || 'Page';
        }
      });
    </script>
  </body>
</html>
