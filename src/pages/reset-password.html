<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700"
    />
    <title>パスワードを再設定 - QWER Atlas</title>
    <meta
      name="description"
      content="QWER Atlas のパスワード再設定ページです。登録済みメールアドレスを使って新しいパスワードへ更新できます。"
    />
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout-container flex h-full grow flex-col">
        {% include header.html %}
        <main class="page-main">
          <div class="page-content">
            <section class="hero-panel">
              <p class="section-eyebrow">Reset Password</p>
              <h1>パスワードを再設定</h1>
              <p>登録済みメールアドレスを入力し、新しいパスワードへ更新します。再設定後は新しいパスワードでログインしてください。</p>
            </section>

            <form id="reset-password-form" class="surface-card form-card">
              <div>
                <label for="reset-email">メールアドレス</label>
                <input id="reset-email" type="email" name="email" required class="w-full" />
              </div>
              <div>
                <label for="reset-password">新しいパスワード (6文字以上)</label>
                <input id="reset-password" type="password" name="password" required class="w-full" />
              </div>
              <div>
                <label for="reset-password-confirm">新しいパスワード (確認用)</label>
                <input id="reset-password-confirm" type="password" name="passwordConfirm" required class="w-full" />
              </div>
              <div id="reset-password-message" class="text-slate-500 text-sm my-2 min-h-[1.5rem]" role="status" aria-live="polite"></div>
              <button type="submit" class="button-primary">パスワードを更新する</button>
              <p class="section-text">設定後は <a class="text-[#0f62fe] underline" href="{{ '/signin.html' | relative_url }}">ログイン画面</a> に戻って確認できます。</p>
            </form>
          </div>
        </main>
        {% include footer.html %}
      </div>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const resetForm = document.getElementById('reset-password-form');
        const message = document.getElementById('reset-password-message');
        const submitButton = resetForm.querySelector('button[type="submit"]');

        if (!window.qwerAuth) {
          submitButton.disabled = true;
          message.textContent = '認証機能を読み込めませんでした。ページを再読み込みしてください。';
          return;
        }

        resetForm.addEventListener('submit', async event => {
          event.preventDefault();
          message.textContent = '';
          submitButton.disabled = true;

          const password = resetForm.password.value;
          const passwordConfirm = resetForm.passwordConfirm.value;
          if (password !== passwordConfirm) {
            message.textContent = '確認用パスワードが一致しません。';
            submitButton.disabled = false;
            return;
          }

          try {
            await window.qwerAuth.resetPassword({
              email: resetForm.email.value,
              password
            });
            window.location.href = '{{ "/signin.html?reset=1" | relative_url }}';
          } catch (error) {
            message.textContent = error.message || 'パスワードの再設定に失敗しました。';
          } finally {
            submitButton.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
